    <h1>Y2018Text preprocessor</h1>
    Syntax: y2018text &lt;source-file&gt; &lt;output directory&gt;<br>
    <ul>
      <li>&lt;source-file&gt; a ADA source program (ending with ".ads"
        or ".adb")</li>
      <li>&lt;output directory&gt; for temporary files and result ADA
        source code. Note parameter value should end with a "/"
        character<br>
      </li>
    </ul>
